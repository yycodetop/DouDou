<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七年级数学智能复习系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, svg: { fontCache: 'global' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-blue-100">
    <div id="app" class="min-h-screen transition-colors duration-700 ease-in-out flex flex-col">
        <!-- 首页视图 -->
        <div id="home-view" class="container mx-auto px-4 py-8 max-w-6xl flex-grow">
            <header class="flex flex-col md:flex-row justify-between items-center mb-10 animate-fade-in-down">
                <div class="flex items-center gap-4 mb-4 md:mb-0">
                    <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200"><i class="fa-solid fa-graduation-cap text-2xl"></i></div>
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">七年级数学 <span class="text-blue-600">智能训练</span></h1>
                        <p class="text-xs text-slate-500">人教版2024 · 沉淀基础 · 智慧提分</p>
                    </div>
                </div>
                <!-- 统计状态栏 -->
                <div class="flex gap-6 text-sm text-slate-500 bg-white px-6 py-3 rounded-full shadow-sm border border-slate-100">
                    <span id="header-stat-total"><i class="fa-solid fa-book-open mr-2 text-blue-400"></i>7 章内容</span>
                    <span class="w-px h-4 bg-slate-200"></span>
                    <span id="header-stat-log"><i class="fa-solid fa-calendar-check mr-2 text-emerald-400"></i>坚持学习</span>
                </div>
            </header>
            
            <!-- 仪表盘 -->
            <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-12 animate-slide-up"></div>

            <!-- 核心选择区 -->
            <div class="animate-slide-up" style="animation-delay: 0.1s;">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center"><span class="w-1.5 h-6 bg-blue-600 rounded-full mr-3"></span>课程模块选择</h2>
                    <span class="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded">点击卡片开始训练</span>
                </div>
                <div id="chapter-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>

        <!-- 答题视图 -->
        <div id="quiz-view" class="hidden h-screen flex flex-col bg-slate-900 overflow-hidden relative">
            <div class="absolute top-0 left-0 w-full h-1 bg-slate-800 z-20"><div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-300"></div></div>
            <div class="flex-grow flex flex-col items-center justify-center p-4">
                <button id="exit-btn" class="absolute top-6 right-6 text-slate-500 hover:text-white z-50"><i class="fa-solid fa-xmark fa-2xl"></i></button>
                <div class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl overflow-hidden">
                    <div class="bg-slate-50 px-8 py-4 border-b border-slate-100 flex justify-between items-center">
                        <span id="chapter-tag" class="text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider"></span>
                        <span id="question-counter" class="text-slate-400 font-mono text-sm"></span>
                    </div>
                    <div class="p-8 md:p-12"><div id="question-text" class="text-2xl md:text-3xl font-medium text-slate-800 mb-10 leading-relaxed"></div><div id="options-container" class="grid gap-4"></div></div>
                    <div id="explanation-area" class="hidden bg-blue-50 border-t border-blue-100 p-8 animate-fade-in"><div id="explanation-text" class="text-slate-600 leading-relaxed text-sm"></div><div class="mt-6 text-right"><button id="next-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform hover:-translate-y-1">下一题</button></div></div>
                </div>
            </div>
        </div>

        <!-- 结果视图 -->
        <div id="result-view" class="hidden min-h-screen flex flex-col items-center justify-center p-4 bg-slate-50">
            <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 max-w-2xl w-full text-center border border-slate-100">
                <div class="w-24 h-24 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fa-solid fa-trophy text-5xl text-yellow-500"></i></div>
                <h2 class="text-3xl font-bold text-slate-900 mb-2">训练完成！</h2>
                <div class="text-7xl font-extrabold text-blue-600 mb-10" id="final-score">0</div>
                <div id="review-advice" class="bg-slate-50 rounded-2xl p-6 text-left mb-8 border border-slate-200"></div>
                <div class="flex gap-4"><button id="retry-btn" class="flex-1 border-2 py-4 rounded-xl font-bold">再练一次</button><button id="backHomeBtn" class="flex-1 bg-slate-900 text-white py-4 rounded-xl font-bold">返回首页</button></div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="mode-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center p-4 backdrop-blur-sm"><div class="bg-white rounded-2xl w-full max-w-3xl shadow-2xl transform scale-100"><div class="p-6 border-b flex justify-between items-center bg-gradient-to-r from-blue-50 to-white rounded-t-2xl"><div><h3 class="text-2xl font-bold text-slate-800" id="mode-modal-title">选择训练模式</h3><p class="text-slate-500 text-sm mt-1">科学分配精力，拒绝题海战术</p></div><button onclick="App.closeModeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark fa-lg"></i></button></div><div class="p-8"><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8"><button onclick="App.startQuickMode()" class="flex items-center p-4 border-2 border-emerald-100 bg-emerald-50/30 rounded-xl hover:border-emerald-400 group text-left"><div class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mr-4 group-hover:scale-110"><i class="fa-solid fa-bolt text-xl"></i></div><div><div class="font-bold text-slate-800 text-lg">快速特训</div><div class="text-xs text-slate-500">随机 15 题 · 保持手感</div></div></button><button onclick="App.startFullMode()" class="flex items-center p-4 border-2 border-blue-100 bg-blue-50/30 rounded-xl hover:border-blue-400 group text-left"><div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-4 group-hover:scale-110"><i class="fa-solid fa-trophy text-xl"></i></div><div><div class="font-bold text-slate-800 text-lg">全真挑战</div><div class="text-xs text-slate-500">覆盖全章考点 · 模拟考试</div></div></button></div><h4 class="font-bold text-slate-400 text-xs uppercase mb-4 flex items-center"><i class="fa-solid fa-list-ul mr-2"></i> 专项突破 (点击选择)</h4><div id="module-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-60 overflow-y-auto pr-1"></div></div></div></div>
    <div id="schedule-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4"><div class="bg-white rounded-2xl w-full max-w-md max-h-[80vh] flex flex-col shadow-2xl animate-slide-up"><div class="p-6 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl"><h3 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-calendar-check mr-2 text-indigo-500"></i> 复习时间表</h3><button onclick="App.closeSchedule()" class="text-slate-400"><i class="fa-solid fa-xmark fa-xl"></i></button></div><div id="schedule-content" class="p-6 overflow-y-auto space-y-3"></div></div></div>
    <div id="log-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center p-4"><div class="bg-white rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl animate-slide-up"><div class="p-6 border-b flex justify-between items-center bg-gradient-to-r from-blue-50 to-white rounded-t-2xl"><h3 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-book-journal-whills mr-2 text-blue-500"></i> 学习日志</h3><button onclick="App.closeLogModal()" class="text-slate-400"><i class="fa-solid fa-xmark fa-lg"></i></button></div><div id="log-content" class="p-6 overflow-y-auto space-y-4 bg-slate-50 flex-grow"></div></div></div>

    <script src="data_chapter1.js"></script>
    <script src="data_chapter2.js"></script>
    <script src="data_chapter3.js"></script>
    <script src="data_chapter4.js"></script>
    <script src="data_chapter5.js"></script>
    <script src="data_chapter6.js"></script>
    <script src="data_chapter7.js"></script>    
    <script src="data_chapter8.js"></script> <!-- 新增 --> 
    <script src="data_chapter9.js"></script> 
    <script src="data_chapter10.js"></script> 
    <script src="data_chapter11.js"></script> 
    <script src="review_manager.js"></script>
    <script src="script.js"></script>
</body>
</html>
